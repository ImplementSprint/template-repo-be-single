name: "BE Pipeline Caller"

on:
  push:
    branches: [test, uat, main, backend]
  pull_request:
    branches: [test, uat, main, backend]
  workflow_dispatch:
    inputs:
      pipeline_mode:
        description: "Pipeline mode (auto|single|multi)"
        type: choice
        options: [auto, single, multi]
        default: auto
      enable_security_scan:
        description: "Run backend security scans"
        type: boolean
        default: true
      enable_sonar:
        description: "Run SonarCloud analysis"
        type: boolean
        default: true
      enable_db_migration:
        description: "Validate DB migrations"
        type: boolean
        default: true
      enable_k6:
        description: "Run Grafana k6 performance tests"
        type: boolean
        default: true
      k6_script_path:
        description: "k6 performance test path"
        type: string
        default: "tests/performance"
      k6_base_url:
        description: "Optional override base URL for k6"
        type: string
        default: ""
      k6_run_only_on_branch:
        description: "Allowed branches for k6"
        type: string
        default: "test,uat"
      run_deploy:
        description: "Enable deployment"
        type: boolean
        default: true
      run_promotion:
        description: "Enable PR promotions"
        type: boolean
        default: true
      dry_run:
        description: "Preview, skip deploy/tag push"
        type: boolean
        default: false

jobs:
  call-backend-orchestrator:
    uses: ImplementSprint/central-workflow/.github/workflows/master-pipeline-backend.yml@backend
    with:
      pipeline_mode: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pipeline_mode || 'auto' }}
      enable_security_scan: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_security_scan || 'true') || true }}
      enable_sonar: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_sonar || 'true') || true }}
      enable_db_migration: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_db_migration || 'true') || true }}
      enable_k6: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_k6 || 'true') || true }}
      k6_script_path: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_script_path || 'tests/performance' }}
      k6_base_url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_base_url || '' }}
      k6_run_only_on_branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_run_only_on_branch || 'test,uat' }}
      run_deploy: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.run_deploy || 'true') || github.event_name == 'push' }}
      run_promotion: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.run_promotion || 'true') || github.event_name == 'push' }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.dry_run || 'false') || false }}
    secrets: inherit
